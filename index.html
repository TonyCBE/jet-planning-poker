<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JET Planning Poker</title>
  <style>
    :root { --bg:#0f172a; --panel:#111827; --card:#1f2937; --text:#f8fafc; --muted:#94a3b8; --accent:#2563eb; --ok:#16a34a; --warn:#f59e0b; --bad:#dc2626; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:linear-gradient(135deg,#0f172a,#111827); color:var(--text); }
    header { padding:24px; border-bottom:1px solid #334155; display:flex; gap:16px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
    h1 { margin:0; font-size:26px; }
    h2 { margin-top:0; }
    .sub { color:var(--muted); font-size:14px; }
    main { max-width:1200px; margin:0 auto; padding:24px; display:grid; grid-template-columns:360px 1fr; gap:20px; }
    section { background:rgba(17,24,39,.92); border:1px solid #334155; border-radius:18px; padding:18px; box-shadow:0 18px 40px rgba(0,0,0,.25); }
    label { display:block; font-size:13px; color:var(--muted); margin:14px 0 6px; }
    input, select, textarea { width:100%; padding:11px 12px; border-radius:10px; border:1px solid #475569; background:#020617; color:var(--text); font-size:15px; }
    textarea { min-height:72px; resize:vertical; }
    button { border:0; border-radius:10px; padding:11px 14px; background:var(--accent); color:white; font-weight:700; cursor:pointer; }
    button.secondary { background:#334155; }
    button.good { background:var(--ok); }
    button.warn { background:var(--warn); color:#111827; }
    button.bad { background:var(--bad); }
    button.small-btn { padding:7px 9px; font-size:12px; }
    button:disabled { opacity:.55; cursor:not-allowed; }
    .row { display:flex; gap:10px; align-items:center; }
    .row > * { flex:1; }
    .status { margin-top:12px; color:var(--muted); font-size:13px; min-height:18px; }
    .cards { display:flex; flex-wrap:wrap; gap:10px; margin-top:12px; }
    .vote-card { min-width:64px; height:64px; border-radius:14px; border:1px solid #475569; background:#020617; color:#fff; font-size:22px; font-weight:800; }
    .vote-card.selected { outline:3px solid #60a5fa; background:#1d4ed8; }
    .story { background:#0f172a; border:1px solid #334155; border-radius:14px; padding:14px; margin:10px 0; }
    .story.active { border-color:#60a5fa; box-shadow:0 0 0 2px rgba(96,165,250,.2); background:#111f3a; }
    .story h3 { margin:0 0 6px; font-size:16px; }
    .story a { color:#93c5fd; }
    .participants { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; margin-top:12px; }
    .person { background:#0f172a; border:1px solid #334155; border-radius:14px; padding:12px; }
    .person .name { font-weight:800; }
    .pill { display:inline-block; margin-top:8px; padding:5px 8px; border-radius:999px; background:#334155; font-size:13px; color:#e2e8f0; }
    .pill.voted { background:#14532d; }
    .pill.revealed { background:#1d4ed8; font-weight:800; }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; margin:14px 0; }
    .small { font-size:12px; color:var(--muted); }
    .summary { margin:12px 0 6px; padding:12px; border-radius:14px; background:#0f172a; border:1px solid #334155; }
    .summary strong { color:#fff; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    @media (max-width:900px){ main{grid-template-columns:1fr;} .grid2{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>JET Planning Poker</h1>
      <div class="sub">ourney Enablement Team · realtime via Firebase · session: <strong id="sessionName"></strong><br>Copyright: Tony Courtens</div>
    </div>
    <div class="row" style="max-width:420px">
      <input id="sessionInput" placeholder="Session name" />
      <button id="openSessionBtn">Open</button>
    </div>
  </header>

  <main>
    <section>
      <h2>Session</h2>
      <label>Your name</label>
      <div class="row">
        <input id="nameInput" placeholder="e.g. Tony" />
        <button id="joinBtn">Join Session</button>
      </div>

      <label>Estimation method</label>
      <select id="methodSelect">
        <option value="fibonacci">Fibonacci</option>
        <option value="tshirt">T-shirt</option>
        <option value="powers">Powers of 2</option>
      </select>

      <div class="toolbar">
        <button class="good" id="revealBtn">Reveal</button>
        <button class="secondary" id="hideBtn">Hide Votes</button>
        <button class="warn" id="resetVotesBtn">Reset Votes</button>
      </div>
      <div class="status" id="status"></div>

      <h2>New story</h2>
      <label>Title</label>
      <input id="storyTitle" placeholder="Story or feature" />
      <label>Jira link</label>
      <input id="storyLink" placeholder="https://..." />
      <label>Notes</label>
      <textarea id="storyNotes" placeholder="Short context"></textarea>
      <button id="addStoryBtn" style="margin-top:12px;width:100%">Add Story</button>

      <p class="small">Share the same GitHub Pages URL using the same <code>?session=JET</code>.</p>
    </section>

    <section>
      <div class="grid2">
        <div>
          <h2>Stories</h2>
          <div id="stories"></div>
        </div>
        <div>
          <h2>Estimation</h2>
          <div id="currentStory" class="small">No active story selected.</div>
          <div id="voteSummary" class="summary small">No votes yet.</div>
          <div class="cards" id="voteCards"></div>
          <h2 style="margin-top:22px">Participants</h2>
          <div class="participants" id="participants"></div>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, push, remove, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD1PqOmEgNDaKVcN-8bqm3h7fEmi4TqjKU",
      authDomain: "jet-planning-poker.firebaseapp.com",
      databaseURL: "https://jet-planning-poker-default-rtdb.firebaseio.com",
      projectId: "jet-planning-poker",
      storageBucket: "jet-planning-poker.firebasestorage.app",
      messagingSenderId: "1025311597119",
      appId: "1:1025311597119:web:a5a83252f42111fe5fce8a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const methods = {
      fibonacci: ["0", "1", "2", "3", "5", "8", "13", "21", "?", "☕"],
      tshirt: ["XS", "S", "M", "L", "XL", "XXL", "?", "☕"],
      powers: ["1", "2", "4", "8", "16", "32", "?", "☕"]
    };

    const $ = id => document.getElementById(id);
    let session = new URLSearchParams(location.search).get("session") || "JET";
    let participantId = localStorage.getItem("jetPokerParticipantId") || crypto.randomUUID();
    localStorage.setItem("jetPokerParticipantId", participantId);
    let myName = localStorage.getItem("jetPokerName") || "";
    let state = {};
    let heartbeatTimer = null;
    const PRESENCE_TIMEOUT_MS = 30000;

    function safeSessionName(s){ return (s || "JET").trim().replace(/[^a-zA-Z0-9_-]/g,"-").slice(0,60) || "JET"; }
    function baseRef(){ return ref(db, `sessions/${session}`); }
    function status(msg){ $("status").textContent = msg || ""; }

    function init(){
      session = safeSessionName(session);
      $("sessionName").textContent = session;
      $("sessionInput").value = session;
      $("nameInput").value = myName;
      listen();
      bind();
      renderVoteCards();
      if (myName) join();
    }

    function bind(){
      $("openSessionBtn").onclick = () => {
        const s = safeSessionName($("sessionInput").value);
        location.href = `${location.pathname}?session=${encodeURIComponent(s)}`;
      };
      $("joinBtn").onclick = join;
      $("methodSelect").onchange = async () => {
        await update(baseRef(), { method: $("methodSelect").value, revealed: false, votes: null });
        renderVoteCards();
      };
      $("revealBtn").onclick = () => update(baseRef(), { revealed: true });
      $("hideBtn").onclick = () => update(baseRef(), { revealed: false });
      $("resetVotesBtn").onclick = () => update(baseRef(), { votes: null, revealed: false });
      $("addStoryBtn").onclick = addStory;
    }

    function listen(){
      onValue(baseRef(), snap => {
        state = snap.val() || {};
        if (!state.method) update(baseRef(), { method: "fibonacci", revealed: false, createdAt: serverTimestamp() });
        $("methodSelect").value = state.method || "fibonacci";
        renderAll();
        status("Connected");
      }, err => status("Firebase error: " + err.message));
    }

    async function join(){
      const name = $("nameInput").value.trim();
      if (!name) return status("Please enter your name first.");
      myName = name;
      localStorage.setItem("jetPokerName", myName);

      const pRef = ref(db, `sessions/${session}/participants/${participantId}`);
      const voteRef = ref(db, `sessions/${session}/votes/${participantId}`);

      // Register disconnect cleanup before writing presence.
      await onDisconnect(pRef).remove();
      await onDisconnect(voteRef).remove();

      await set(pRef, { name: myName, joinedAt: Date.now(), lastSeen: Date.now(), offline: false });
      startHeartbeat();
      status(`${myName} joined the session.`);
    }

    function startHeartbeat(){
      if (heartbeatTimer) clearInterval(heartbeatTimer);
      const pRef = ref(db, `sessions/${session}/participants/${participantId}`);
      const beat = () => {
        if (!myName) return;
        update(pRef, { name: myName, lastSeen: Date.now(), offline: false }).catch(() => {});
      };
      beat();
      heartbeatTimer = setInterval(beat, 5000);
    }

    // Best-effort cleanup for normal tab/browser closes. The heartbeat timeout below
    // is the reliable fallback for cases where the browser blocks async unload work.
    window.addEventListener("pagehide", () => {
      remove(ref(db, `sessions/${session}/participants/${participantId}`)).catch(() => {});
      remove(ref(db, `sessions/${session}/votes/${participantId}`)).catch(() => {});
    });

    async function addStory(){
      const title = $("storyTitle").value.trim();
      if (!title) return status("Please enter a story title.");
      const order = nextStoryOrder();
      const story = {
        title,
        link: $("storyLink").value.trim(),
        notes: $("storyNotes").value.trim(),
        order,
        createdAt: Date.now()
      };
      const newRef = push(ref(db, `sessions/${session}/stories`));
      await set(newRef, story);
      await update(baseRef(), { activeStoryId: newRef.key, votes: null, revealed: false });
      $("storyTitle").value = ""; $("storyLink").value = ""; $("storyNotes").value = "";
    }

    function nextStoryOrder(){
      const stories = state.stories || {};
      const orders = Object.values(stories).map(s => Number.isFinite(s.order) ? s.order : (s.createdAt || 0));
      return orders.length ? Math.max(...orders) + 1 : Date.now();
    }

    async function selectStory(id){
      await update(baseRef(), { activeStoryId: id, votes: null, revealed: false });
    }

    async function deleteStory(id){
      if (!confirm("Delete story?")) return;
      await remove(ref(db, `sessions/${session}/stories/${id}`));
      if (state.activeStoryId === id) await update(baseRef(), { activeStoryId: null, votes: null, revealed: false });
    }

    async function moveStory(id, direction){
      const ordered = getOrderedStories();
      const index = ordered.findIndex(item => item.id === id);
      const targetIndex = index + direction;
      if (index < 0 || targetIndex < 0 || targetIndex >= ordered.length) return;
      const updates = {};
      updates[`stories/${ordered[index].id}/order`] = ordered[targetIndex].story.order ?? ordered[targetIndex].story.createdAt ?? targetIndex;
      updates[`stories/${ordered[targetIndex].id}/order`] = ordered[index].story.order ?? ordered[index].story.createdAt ?? index;
      await update(baseRef(), updates);
    }

    async function vote(value){
      if (!myName) return status("Enter your name and click Join Session.");
      if (!state.activeStoryId) return status("Select a story first.");
      await update(ref(db, `sessions/${session}/votes/${participantId}`), { name: myName, value, votedAt: Date.now() });
      await update(ref(db, `sessions/${session}/participants/${participantId}`), { name: myName, lastSeen: Date.now(), offline: false });
      status(`Vote recorded: ${value}`);
    }

    function renderAll(){ cleanupStalePresence(); renderStories(); renderVoteCards(); renderParticipants(); renderVoteSummary(); }

    function getOrderedStories(){
      const stories = state.stories || {};
      return Object.keys(stories)
        .map(id => ({ id, story: stories[id] }))
        .sort((a,b) => {
          const ao = a.story.order ?? a.story.createdAt ?? 0;
          const bo = b.story.order ?? b.story.createdAt ?? 0;
          return ao - bo;
        });
    }

    function renderStories(){
      const wrap = $("stories"); wrap.innerHTML = "";
      const ordered = getOrderedStories();
      if (!ordered.length) { wrap.innerHTML = '<p class="small">No stories yet.</p>'; return; }
      ordered.forEach((item, index) => {
        const id = item.id;
        const s = item.story;
        const div = document.createElement("div"); div.className = "story" + (id === state.activeStoryId ? " active" : "");
        div.innerHTML = `<h3>${escapeHtml(s.title)}</h3>${s.link ? `<a href="${escapeAttr(s.link)}" target="_blank" rel="noopener">Open Jira ticket</a>` : ""}<p class="small">${escapeHtml(s.notes || "")}</p><div class="toolbar"><button class="secondary" data-action="select">Estimate</button><button class="secondary small-btn" data-action="up" title="Move up">↑</button><button class="secondary small-btn" data-action="down" title="Move down">↓</button><button class="bad" data-action="delete">Delete</button></div>`;
        div.querySelector('[data-action="select"]').onclick = () => selectStory(id);
        div.querySelector('[data-action="up"]').onclick = () => moveStory(id, -1);
        div.querySelector('[data-action="down"]').onclick = () => moveStory(id, 1);
        div.querySelector('[data-action="up"]').disabled = index === 0;
        div.querySelector('[data-action="down"]').disabled = index === ordered.length - 1;
        div.querySelector('[data-action="delete"]').onclick = () => deleteStory(id);
        wrap.appendChild(div);
      });
    }

    function renderVoteCards(){
      const wrap = $("voteCards"); wrap.innerHTML = "";
      const method = state.method || $("methodSelect").value || "fibonacci";
      const cards = methods[method] || methods.fibonacci;
      const myVote = state.votes?.[participantId]?.value;
      cards.forEach(v => {
        const btn = document.createElement("button"); btn.className = "vote-card" + (myVote === v ? " selected" : ""); btn.textContent = v; btn.onclick = () => vote(v); wrap.appendChild(btn);
      });
      const story = state.stories?.[state.activeStoryId];
      $("currentStory").innerHTML = story ? `Active story: <strong>${escapeHtml(story.title)}</strong>` : "No active story selected.";
    }

    function renderVoteSummary(){
      const participants = state.participants || {};
      const votes = state.votes || {};
      const participantIds = Object.keys(participants).filter(id => !participants[id].offline);
      const voteValues = Object.values(votes).map(v => v.value).filter(v => v !== undefined && v !== null);
      const votedCount = participantIds.filter(id => votes[id]).length;
      const total = participantIds.length;
      let html = `<strong>${votedCount} / ${total}</strong> participants voted.`;

      if (state.revealed && voteValues.length) {
        const counts = {};
        voteValues.forEach(v => counts[v] = (counts[v] || 0) + 1);
        const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1] || String(a[0]).localeCompare(String(b[0])));
        const top = sorted[0];
        const distribution = sorted.map(([value, count]) => `${escapeHtml(value)} × ${count}`).join(" · ");
        html += `<br>Most selected: <strong>${escapeHtml(top[0])}</strong> (${top[1]} vote${top[1] === 1 ? "" : "s"}).`;
        html += `<br>Distribution: ${distribution}.`;
      } else if (!state.revealed && voteValues.length) {
        html += `<br>Votes are hidden until Reveal.`;
      } else if (!voteValues.length) {
        html += `<br>No votes yet.`;
      }

      $("voteSummary").innerHTML = html;
    }


    function activeParticipantIds(){
      const participants = state.participants || {};
      const now = Date.now();
      return Object.keys(participants).filter(id => {
        const p = participants[id] || {};
        if (p.offline) return false;
        if (!p.lastSeen) return true;
        return now - p.lastSeen <= PRESENCE_TIMEOUT_MS;
      });
    }

    function cleanupStalePresence(){
      const participants = state.participants || {};
      const votes = state.votes || {};
      const now = Date.now();
      const updates = {};
      let changed = false;
      Object.keys(participants).forEach(id => {
        const p = participants[id] || {};
        if (p.offline || (p.lastSeen && now - p.lastSeen > PRESENCE_TIMEOUT_MS)) {
          updates[`participants/${id}`] = null;
          if (votes[id]) updates[`votes/${id}`] = null;
          changed = true;
        }
      });
      if (changed) update(baseRef(), updates).catch(() => {});
    }

    function renderParticipants(){
      const wrap = $("participants"); wrap.innerHTML = "";
      const participants = state.participants || {};
      const votes = state.votes || {};
      const ids = activeParticipantIds()
        .sort((a,b)=>(participants[a].name||"").localeCompare(participants[b].name||""));
      if (!ids.length) { wrap.innerHTML = '<p class="small">No participants yet.</p>'; return; }
      ids.forEach(id => {
        const p = participants[id]; const v = votes[id];
        const pill = state.revealed
          ? `<span class="pill revealed">${v ? escapeHtml(v.value) : "no vote"}</span>`
          : `<span class="pill ${v ? "voted" : ""}">${v ? "voted" : "waiting for vote"}</span>`;
        const div = document.createElement("div"); div.className = "person";
        div.innerHTML = `<div class="name">${escapeHtml(p.name || "Unknown")}</div>${pill}`;
        wrap.appendChild(div);
      });
    }

    function escapeHtml(str){ return String(str).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
    function escapeAttr(str){ return escapeHtml(str).replace(/`/g,"&#96;"); }

    init();
  </script>
</body>
</html>
